<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"> <!-- define o charset para suportar acentos -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- deixa responsivo no celular -->
  <link rel="stylesheet" href="style.css"> <!-- vincula o arquivo de estilo -->
  <title>To Do List</title>
</head>
<body>

  <!-- cabeçalho com título e contador de tarefas -->
  <header>
    <h1>To Do List</h1>
    <p id="contador">0 tarefas</p>
  </header>

  <!-- conteúdo principal da aplicação -->
  <main id="container">

    <!-- área do formulário: input e botões -->
    <section>
      <input type="text" id="novaTarefa" placeholder="Digite uma tarefa..." autofocus>
      <button id="btnAdicionar">Adicionar</button>
      <button id="btnLimpar">Limpar tudo</button>
    </section>

    <!-- área onde as tarefas aparecem dinamicamente via JavaScript -->
    <section id="result-area">
      <ul id="lista"></ul>
    </section>

  </main>

  <!-- arquivo JavaScript vinculado no final para garantir que o HTML carregou primeiro -->
  <script src="codigoaula.js"></script>

</body>
</html>
